# Monthly dead-link check across post content
name: Check links

on:
  schedule:
    - cron: '0 8 1 * *' # 1st of each month, 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in content
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude 'web\.archive\.org'
            --exclude 'outlook\.office365\.com'
            'src/content/**/*.md'
            'README.md'
          fail: true
